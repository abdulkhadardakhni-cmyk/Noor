<!DOCTYPE html>
<html>
<head>
<style>
#beads{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin:10px 0;
}

.bead{
width:12px;
height:12px;
margin:4px;
border-radius:50%;
background:#ccc;
transition:.3s;
}

.active{
background:#1e6f5c;
transform:scale(1.2);
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#1e6f5c;
color:white;
}
</style>
<title>NOOR - Islamic App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  background: url("https://img.pikbest.com/backgrounds/20250220/islamic-mosque-moon-dark-sky-background_11540736.jpg!w700wp") no-repeat center/cover;
  color:white;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
background:rgba(0,0,0,0.3);
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
margin:20px auto;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#2c5364;
color:white;
}

button:hover{
background:#1c3947;
}

.dark{
background:black;
color:white;
}
</style>
</head>

<body>

<header>🌙 NOOR - Islamic Helper By Aslam Dakhani</header>

<div class="container">

<h3 id="hijriDate">Loading Islamic Date...</h3>

<div class="card">

<h2>📿 Ultra Tasbeeh</h2>

<select id="zikr">
<option>SubhanAllah</option>
<option>Alhamdulillah</option>
<option>Allahu Akbar</option>
<option>Astaghfirullah</option>
</select>

<h1 id="count">0</h1>

<div id="beads"></div>

<button onclick="countTasbeeh()">Tap</button>
<button onclick="resetTasbeeh()">Reset</button>

<br><br>
<button onclick="setLimit(33)">33</button>
<button onclick="setLimit(99)">99</button>

</div>
  
<div class="card">
<h2>📖 Quran Reader</h2>

<select id="surahSelect" onchange="loadSurah()"></select>

<button onclick="playSurahAudio()">▶ Play Surah</button>
<button type="button" onclick="stopSurahAudio()">⏹ Stop</button>

<div id="quranText">Select Surah</div>

<select id="paraSelect" onchange="loadPara()">
<option value="">Select Para</option>
</select>
  
</div>

<h3>Daily Ayah</h3>
<p id="ayahText">Loading Ayah...</p>

  
<script>

// load surah list
async function loadSurahList(){
const res = await fetch("https://api.alquran.cloud/v1/surah");
const data = await res.json();

let select=document.getElementById("surahSelect");

data.data.forEach(s=>{
let opt=document.createElement("option");
opt.value=s.number;
opt.text=s.number+" - "+s.englishName;
select.appendChild(opt);
});
}
loadSurahList();


// load Arabic + English
async function loadSurah(){

let num=document.getElementById("surahSelect").value;

const res=await fetch(
`https://api.alquran.cloud/v1/surah/${num}/editions/ar.alafasy,en.asad`
);

const data=await res.json();

let arabic=data.data[0].ayahs;
let english=data.data[1].ayahs;

let html="";

for(let i=0;i<arabic.length;i++){
html+=`
<div style="margin-bottom:20px">
<p style="font-size:24px;direction:rtl">${arabic[i].text}</p>
<p style="font-size:16px;color:#ddd">${english[i].text}</p>
</div>
`;
}

document.getElementById("quranText").innerHTML=html;

}
</script>

<script>
const paraSelect = document.getElementById("paraSelect");

for(let i=1;i<=30;i++){
  let option=document.createElement("option");
  option.value=i;
  option.text="Para "+i;
  paraSelect.appendChild(option);
}
</script>

  <script>
async function loadPara(){
  const num = document.getElementById("paraSelect").value;
  if(!num) return;

  document.getElementById("quranText").innerHTML="Loading...";

  const res = await fetch(`https://api.alquran.cloud/v1/juz/${num}/quran-uthmani`);
  const data = await res.json();

  let html="";

 data.data.ayahs.forEach(a => {
  html += `
    <div style="margin-bottom:18px;">
      <p style="font-size:24px; direction:rtl; text-align:right;">
        ${a.text}
      </p>

      <button onclick="playAudio(${a.number})">▶ Play</button>
      <button onclick="stopAyahAudio()">⏹ Stop</button>
    </div>
  `;
});

  document.getElementById("quranText").innerHTML=html;
}
</script>

  <script>
let audioPlayer = new Audio();

function playAudio(num){
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
  audioPlayer.src = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${num}.mp3`;
  audioPlayer.play();
}
</script>

  <script>
let surahAudio = new Audio();
let scrollInterval;

function playSurahAudio(){
  const surah = document.getElementById("surahSelect").value;
  if(!surah) return;

  surahAudio.src = "https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/" + surah + ".mp3";
  surahAudio.play();

  clearInterval(scrollInterval);
  scrollInterval = setInterval(()=>{
    window.scrollBy(0,1);
  },100);
}

surahAudio.onpause = ()=> clearInterval(scrollInterval);
surahAudio.onended = ()=> clearInterval(scrollInterval);
</script>

<script>
async function loadHijri(){

try{
const res = await fetch("https://api.aladhan.com/v1/gToH");
const data = await res.json();

const h = data.data.hijri;

document.getElementById("hijriDate").innerText =
h.day + " " + h.month.en + " " + h.year + " AH";
}
catch{
document.getElementById("hijriDate").innerText="Unable to load date";
}

}

loadHijri();
</script>

<script>
async function loadAyah(){
try{
const res = await fetch("https://api.alquran.cloud/v1/ayah/"+Math.floor(Math.random()*6236)+"/en.asad");
const data = await res.json();

document.getElementById("ayahText").innerText =
data.data.text + " (Surah " +
data.data.surah.englishName + " Ayah " +
data.data.numberInSurah + ")";
}
catch{
document.getElementById("ayahText").innerText="Unable to load Ayah";
}
}

loadAyah();
<script>

  <script>
let count = localStorage.getItem("zikrCount") || 0;
let limit = 33;

const beadsDiv = document.getElementById("beads");

function createBeads(){
beadsDiv.innerHTML="";
for(let i=0;i<limit;i++){
let b=document.createElement("div");
b.className="bead";
beadsDiv.appendChild(b);
}
}
createBeads();

update();

function countTasbeeh(){

count++;
localStorage.setItem("zikrCount",count);

if(navigator.vibrate) navigator.vibrate(40);

playClick();

if(count>=limit){
alert("Completed "+limit+" ✔");
count=0;
}

update();
}

function resetTasbeeh(){
count=0;
localStorage.setItem("zikrCount",count);
update();
}

function setLimit(l){
limit=l;
count=0;
createBeads();
update();
}

function update(){
document.getElementById("count").innerText=count;

let beads=document.querySelectorAll(".bead");

beads.forEach((b,i)=>{
b.classList.toggle("active",i<count);
});
}

function playClick(){
let audio=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=click-124467.mp3");
audio.play();
}
</script>
  
</body>


</html>

<!DOCTYPE html>
<html>
<head>
<title>NOOR - Islamic App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  background: url("https://img.pikbest.com/backgrounds/20250220/islamic-mosque-moon-dark-sky-background_11540736.jpg!w700wp") no-repeat center/cover;
  color:white;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
background:rgba(0,0,0,0.3);
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
margin:20px auto;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#2c5364;
color:white;
}

button:hover{
background:#1c3947;
}

.dark{
background:black;
color:white;
}
</style>
</head>

<body>

<header>🌙 NOOR - Islamic Helper</header>

<div class="container">

  <div class="card">
<h2>Hadith Collection</h2>

<select id="bookSelect" onchange="loadBook()">
  <option value="bukhari">Bukhari</option>
  <option value="muslim">Muslim</option>
  <option value="tirmidhi">Tirmidhi</option>
</select>

<br><br>

<p id="hadithText">Click Next to load Hadith</p>

<button onclick="prevHadith()">⬅ Prev</button>
<button onclick="nextHadith()">Next ➡</button>
</div>

<div class="card">
<h2>📖 Quran Reader</h2>

<select id="surahSelect" onchange="loadSurah()"></select>

<button onclick="playSurahAudio()">▶ Play Surah</button>
<button type="button" onclick="stopSurahAudio()">⏹ Stop</button>

<div id="quranText">Select Surah</div>

<select id="paraSelect" onchange="loadPara()">
<option value="">Select Para</option>
</select>
  
</div>




 
<script>

// load surah list
async function loadSurahList(){
const res = await fetch("https://api.alquran.cloud/v1/surah");
const data = await res.json();

let select=document.getElementById("surahSelect");

data.data.forEach(s=>{
let opt=document.createElement("option");
opt.value=s.number;
opt.text=s.number+" - "+s.englishName;
select.appendChild(opt);
});
}
loadSurahList();


// load Arabic + English
async function loadSurah(){

let num=document.getElementById("surahSelect").value;

const res=await fetch(
`https://api.alquran.cloud/v1/surah/${num}/editions/ar.alafasy,en.asad`
);

const data=await res.json();

let arabic=data.data[0].ayahs;
let english=data.data[1].ayahs;

let html="";

for(let i=0;i<arabic.length;i++){
html+=`
<div style="margin-bottom:20px">
<p style="font-size:24px;direction:rtl">${arabic[i].text}</p>
<p style="font-size:16px;color:#ddd">${english[i].text}</p>
</div>
`;
}

document.getElementById("quranText").innerHTML=html;

}
</script>

<script>
const paraSelect = document.getElementById("paraSelect");

for(let i=1;i<=30;i++){
  let option=document.createElement("option");
  option.value=i;
  option.text="Para "+i;
  paraSelect.appendChild(option);
}
</script>

  <script>
async function loadPara(){
  const num = document.getElementById("paraSelect").value;
  if(!num) return;

  document.getElementById("quranText").innerHTML="Loading...";

  const res = await fetch(`https://api.alquran.cloud/v1/juz/${num}/quran-uthmani`);
  const data = await res.json();

  let html="";

 data.data.ayahs.forEach(a => {
  html += `
    <div style="margin-bottom:18px;">
      <p style="font-size:24px; direction:rtl; text-align:right;">
        ${a.text}
      </p>

      <button onclick="playAudio(${a.number})">▶ Play</button>
      <button onclick="stopAyahAudio()">⏹ Stop</button>
    </div>
  `;
});

  document.getElementById("quranText").innerHTML=html;
}
</script>

  <script>
let audioPlayer = new Audio();

function playAudio(num){
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
  audioPlayer.src = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${num}.mp3`;
  audioPlayer.play();
}
</script>

  <script>
let surahAudio = new Audio();
let scrollInterval;

function playSurahAudio(){
  const surah = document.getElementById("surahSelect").value;
  if(!surah) return;

  surahAudio.src = "https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/" + surah + ".mp3";
  surahAudio.play();

  clearInterval(scrollInterval);
  scrollInterval = setInterval(()=>{
    window.scrollBy(0,1);
  },100);
}

surahAudio.onpause = ()=> clearInterval(scrollInterval);
surahAudio.onended = ()=> clearInterval(scrollInterval);
</script>

  <script>
function stopSurahAudio(){
  surahAudio.pause();
  surahAudio.currentTime = 0;
}
</script>

  <script>
function stopAyahAudio(){
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
}
</script>

  <script>
let hadiths=[];
let index=0;
let showArabic=false;

async function loadBook(){
  document.getElementById("hadithText").innerText="Loading Hadith...";

  const book=document.getElementById("bookSelect").value;

  const res = await fetch(`https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/eng-${book}.json`);
  const data = await res.json();

  hadiths=data.hadiths;
  index=0;
  showHadith();
}

function showHadith(){
  if(hadiths.length===0) return;

  const h=hadiths[index];

  document.getElementById("hadithText").innerHTML =
    (showArabic && h.arab ? h.arab+"<br><br>" : "") +
    h.text +
    "<br><br><b>Hadith #" + h.hadithnumber + "</b>";
}

function nextHadith(){
  if(hadiths.length===0) return;
  index=(index+1)%hadiths.length;
  showHadith();
}

function prevHadith(){
  if(hadiths.length===0) return;
  index=(index-1+hadiths.length)%hadiths.length;
  showHadith();
}

function toggleLang(){
  showArabic=!showArabic;
  showHadith();
}

loadBook();
</script>


  
</body>


</html>
